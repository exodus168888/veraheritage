<svg viewBox="0 0 220 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="45%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#9A7220"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EACF72"/>
      <stop offset="100%" style="stop-color:#A87C28"/>
    </linearGradient>
  </defs>

  <!-- Emblem group centered at 110,100 -->
  <g transform="translate(110, 100)">
    <!-- Center flame / droplet (purple) -->
    <path d="M0,-52 C-5,-35 -8,-18 -8,0 C-8,14 -4,22 0,26 C4,22 8,14 8,0 C8,-18 5,-35 0,-52Z" fill="#6B35A8"/>

    <!-- Top center petal (gold) -->
    <path d="M0,-72 C-7,-55 -10,-36 -9,-18 C-5,-22 0,-26 0,-26 C0,-26 5,-22 9,-18 C10,-36 7,-55 0,-72Z" fill="url(#goldGrad)"/>

    <!-- Upper-left petal -->
    <path d="M0,-40 C-16,-45 -34,-40 -46,-28 C-52,-20 -52,-10 -46,-4 C-38,4 -26,2 -16,-8 C-8,-16 -2,-28 0,-40Z" fill="url(#goldGrad)"/>

    <!-- Upper-right petal -->
    <path d="M0,-40 C16,-45 34,-40 46,-28 C52,-20 52,-10 46,-4 C38,4 26,2 16,-8 C8,-16 2,-28 0,-40Z" fill="url(#goldGrad2)"/>

    <!-- Mid-left petal -->
    <path d="M-8,5 C-22,2 -40,10 -50,24 C-56,34 -54,46 -46,52 C-36,58 -22,52 -14,38 C-6,26 -4,14 -8,5Z" fill="url(#goldGrad)"/>

    <!-- Mid-right petal -->
    <path d="M8,5 C22,2 40,10 50,24 C56,34 54,46 46,52 C36,58 22,52 14,38 C6,26 4,14 8,5Z" fill="url(#goldGrad2)"/>

    <!-- Bottom-left leaf -->
    <path d="M-6,28 C-18,32 -30,44 -32,60 C-33,70 -28,78 -20,78 C-12,78 -4,70 0,56 C0,56 -2,38 -6,28Z" fill="url(#goldGrad)" opacity="0.88"/>

    <!-- Bottom-right leaf -->
    <path d="M6,28 C18,32 30,44 32,60 C33,70 28,78 20,78 C12,78 4,70 0,56 C0,56 2,38 6,28Z" fill="url(#goldGrad2)" opacity="0.88"/>

    <!-- Bottom center stem-bud -->
    <path d="M0,60 C-4,68 -4,78 0,84 C4,78 4,68 0,60Z" fill="url(#goldGrad)"/>

    <!-- Small inner ring accent -->
    <circle cx="0" cy="2" r="10" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>

    <!-- Center jewel -->
    <ellipse cx="0" cy="2" rx="5" ry="7" fill="#4A1878"/>
  </g>

  <!-- VERA text -->
  <text x="110" y="200" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="36"
        fill="#6B35A8"
        letter-spacing="6">VERA</text>

  <!-- HERITAGE text -->
  <text x="110" y="222" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="400"
        font-size="11.5"
        fill="#C9A84C"
        letter-spacing="7">HERITAGE</text>

  <!-- Thin gold rule under HERITAGE -->
  <line x1="72" y1="230" x2="148" y2="230" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
</svg>
