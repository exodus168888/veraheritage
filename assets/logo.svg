<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" width="220" height="240" role="img" aria-label="Vera Heritage Logo">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B860"/>
      <stop offset="100%" stop-color="#7A6018"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A03A"/>
      <stop offset="100%" stop-color="#8A6820"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#9868C8"/>
      <stop offset="100%" stop-color="#4A1878"/>
    </linearGradient>
  </defs>

  <!-- ═══ EMBLEM — fan of leaves rising from base, centered x=110 ═══ -->
  <g transform="translate(110,96)">

    <!-- ── Outermost arching bracket strokes ── -->
    <path d="M -4,2 C -30,-5 -60,-22 -54,-68"
          stroke="url(#g1)" stroke-width="2.6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M  4,2 C  30,-5  60,-22  54,-68"
          stroke="url(#g2)" stroke-width="2.6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ── Outer large filled leaf — left ── -->
    <path d="M -2,4 C -22,-8 -36,-38 -22,-70
             C -13,-52 -5,-14 -2,4 Z"
          fill="url(#g1)"/>
    <!-- ── Outer large filled leaf — right ── -->
    <path d="M  2,4 C  22,-8  36,-38  22,-70
             C  13,-52  5,-14  2,4 Z"
          fill="url(#g2)"/>

    <!-- ── Inner medium leaf — left ── -->
    <path d="M -1,2 C -10,-12 -12,-42 -4,-70
             C  0,-48  1,-10  -1,2 Z"
          fill="#C4A03A"/>
    <!-- ── Inner medium leaf — right ── -->
    <path d="M  1,2 C  10,-12  12,-42  4,-70
             C   0,-48 -1,-10   1,2 Z"
          fill="#B89030"/>

    <!-- ── Central stem ── -->
    <line x1="0" y1="4" x2="0" y2="-76"
          stroke="#8A6820" stroke-width="2" stroke-linecap="round"/>

    <!-- ── Purple teardrop gem at top ── -->
    <!-- outer gem shape -->
    <path d="M 0,-88 C -7,-78 -8,-68 -5,-60 C -2,-54 2,-54 5,-60 C 8,-68 7,-78 0,-88 Z"
          fill="url(#gem)"/>
    <!-- gem highlight -->
    <ellipse cx="-2" cy="-80" rx="2" ry="3.5" fill="#C090F0" opacity="0.4"/>

    <!-- ── Decorative curved base ── -->
    <path d="M -62,8 Q 0,20 62,8"
          stroke="url(#g1)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- base center dot -->
    <circle cx="0" cy="4" r="2.8" fill="#9B7D2A"/>

  </g>
  <!-- ═══ END EMBLEM ═══ -->

  <!-- ── VERA wordmark ── -->
  <text
    x="110" y="162"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="54"
    font-weight="700"
    fill="#6B35A8"
    letter-spacing="6"
  >VERA</text>

  <!-- ── Gold thin rule ── -->
  <line x1="58" y1="171" x2="162" y2="171"
        stroke="#9B7D2A" stroke-width="0.9"/>

  <!-- ── HERITAGE wordmark ── -->
  <text
    x="110" y="190"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11.5"
    fill="#9B7D2A"
    letter-spacing="7"
  >HERITAGE</text>

</svg>
